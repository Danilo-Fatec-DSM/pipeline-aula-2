name: Pipeline Aula 02

on:
  push:
    branchs:          
      -dev          

jobs: 

  build:
    runs-on: ubuntu-latest

    steps: 
      - name: Checkout código no dev
        uses: actions/checkout@v3

      - name: Configurar Python na dev
        uses: actions/setup-python@v4
        with: 
          python-version: '3.11'

      - name: Instalar dependencias na dev
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes na dev
        run: pytest                    